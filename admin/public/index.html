<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FundingCompass Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --accent:    #C87830;
    --accent-hover: #d98940;
    --green:     #3fb950;
    --red:       #f85149;
    --blue:      #58a6ff;
    --sidebar-w: 280px;
  }

  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* ── Layout ── */
  .app { display: grid; grid-template-rows: 48px 1fr; grid-template-columns: var(--sidebar-w) 1fr; height: 100vh; }

  /* ── Header ── */
  .header { grid-column: 1 / -1; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; }
  .header__logo { font-weight: 700; font-size: 15px; color: var(--text); }
  .header__logo span { color: var(--accent); }
  .header__spacer { flex: 1; }
  .header__status { font-size: 12px; color: var(--muted); }
  .header__status.saved  { color: var(--green); }
  .header__status.unsaved { color: var(--accent); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s; }
  .btn--build  { background: var(--accent); color: #fff; }
  .btn--build:hover { background: var(--accent-hover); }
  .btn--build:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn--save   { background: #238636; color: #fff; }
  .btn--save:hover { background: #2ea043; }
  .btn--save:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn--ghost  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn--ghost:hover { color: var(--text); border-color: var(--muted); }

  /* ── Sidebar ── */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; }
  .sidebar__search { padding: 12px; border-bottom: 1px solid var(--border); }
  .sidebar__search input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 13px; outline: none; }
  .sidebar__search input:focus { border-color: var(--accent); }
  .sidebar__search input::placeholder { color: var(--muted); }

  .section { margin-bottom: 4px; }
  .section__label { padding: 8px 12px 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .page-item { display: flex; align-items: center; padding: 6px 12px 6px 16px; cursor: pointer; border-radius: 0; gap: 8px; transition: background 0.1s; }
  .page-item:hover { background: rgba(255,255,255,0.05); }
  .page-item.active { background: rgba(200,120,48,0.15); border-right: 2px solid var(--accent); }
  .page-item__title { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .page-item.active .page-item__title { color: var(--accent); font-weight: 500; }
  .page-item__dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .page-item.modified .page-item__dot { background: var(--accent); }

  /* ── Editor ── */
  .editor-area { display: flex; flex-direction: column; overflow: hidden; }
  .editor-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 8px; }
  .editor-empty svg { opacity: 0.3; }
  .editor-empty p { font-size: 15px; }

  .editor { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .editor__meta { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
  .editor__path { font-size: 11px; color: var(--muted); font-family: monospace; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .field input, .field textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 13px; outline: none; resize: none; font-family: inherit; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { height: 60px; }
  .field__row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end; }
  .field__hint { font-size: 11px; color: var(--muted); text-align: right; }
  .field__hint.warn { color: var(--accent); }

  .editor__body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .editor__body-header { padding: 8px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .editor__body-header span { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .editor__body-header small { font-size: 11px; color: var(--muted); }
  .editor__body textarea { flex: 1; width: 100%; background: var(--bg); border: none; padding: 20px 24px; color: var(--text); font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; line-height: 1.7; outline: none; resize: none; overflow-y: auto; }

  .editor__footer { padding: 10px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: var(--surface); }
  .editor__footer .spacer { flex: 1; }

  /* ── Build Console ── */
  .console { position: fixed; bottom: 0; left: var(--sidebar-w); right: 0; background: #0a0c10; border-top: 1px solid var(--border); transition: height 0.25s ease; height: 0; overflow: hidden; display: flex; flex-direction: column; }
  .console.open { height: 240px; }
  .console__header { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .console__title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .console__indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .console__indicator.running { background: var(--accent); animation: pulse 1s infinite; }
  .console__indicator.success { background: var(--green); }
  .console__indicator.error   { background: var(--red); }
  .console__close { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 6px; }
  .console__close:hover { color: var(--text); }
  .console__output { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; color: #adbac7; white-space: pre-wrap; word-break: break-all; }
  .console__output .line--success { color: var(--green); }
  .console__output .line--error   { color: var(--red); }
  .console__output .line--info    { color: var(--blue); }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header__logo">Funding<span>Compass</span> Admin</div>
    <div class="header__spacer"></div>
    <span class="header__status" id="saveStatus"></span>
    <button class="btn btn--build" id="buildBtn" onclick="runBuild()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0zm1.5 4.5a.5.5 0 0 0-1 0v4.793L6.854 7.646a.5.5 0 1 0-.708.708l2.5 2.5a.5.5 0 0 0 .708 0l2.5-2.5a.5.5 0 0 0-.708-.708L9.5 9.293V4.5z"/></svg>
      Build
    </button>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__search">
      <input type="text" id="searchInput" placeholder="Search pages…" oninput="filterPages(this.value)" />
    </div>
    <div id="pageList"></div>
  </aside>

  <!-- Editor area -->
  <div class="editor-area" id="editorArea">
    <div class="editor-empty" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <p>Select a page to edit</p>
    </div>
    <div class="editor" id="editorPanel" style="display:none;">
      <div class="editor__meta">
        <div class="editor__path" id="editorPath"></div>
        <div class="field">
          <label>Page Title</label>
          <input type="text" id="fieldTitle" oninput="markDirty()" />
        </div>
        <div class="field">
          <div class="field__row">
            <div>
              <label>Meta Description</label>
              <textarea id="fieldDesc" oninput="markDirty(); updateDescCount()"></textarea>
            </div>
            <div class="field__hint" id="descCount">0 / 160</div>
          </div>
        </div>
        <div class="field" id="lastReviewedField">
          <label>Last Reviewed</label>
          <input type="date" id="fieldDate" oninput="markDirty()" style="max-width:180px;" />
        </div>
      </div>
      <div class="editor__body">
        <div class="editor__body-header">
          <span>Page Content</span>
          <small>Markdown + HTML — preserve all &lt;div&gt; blocks</small>
        </div>
        <textarea id="fieldContent" spellcheck="false" oninput="markDirty()"></textarea>
      </div>
      <div class="editor__footer">
        <span id="footerPath" style="font-size:12px;color:var(--muted);font-family:monospace;"></span>
        <div class="spacer"></div>
        <button class="btn btn--ghost" onclick="revertPage()">Revert</button>
        <button class="btn btn--save" id="saveBtn" onclick="savePage()" disabled>Save</button>
      </div>
    </div>
  </div>

</div>

<!-- Build Console -->
<div class="console" id="console">
  <div class="console__header">
    <div class="console__indicator" id="consoleIndicator"></div>
    <span class="console__title">Build Output</span>
    <button class="console__close" onclick="closeConsole()">×</button>
  </div>
  <div class="console__output" id="consoleOutput"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allPages    = [];
let currentPage = null;   // { path, title, description, lastReviewed, content }
let savedPage   = null;   // snapshot at last save / load
let dirty       = false;

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  const pages = await fetch('/api/pages').then(r => r.json());
  allPages = pages;
  renderSidebar(pages);
})();

// ── Sidebar ────────────────────────────────────────────────────────────────
const SECTION_LABELS = {
  compare:    'Compare',
  guides:     'Guides',
  industries: 'Industries',
  providers:  'Providers',
  tools:      'Tools',
  legal:      'Site Pages',
  glossary:   'Glossary',
  root:       'Home',
};
const SECTION_ORDER = ['compare','guides','industries','providers','tools','legal','glossary','root'];

function renderSidebar(pages) {
  const grouped = {};
  for (const p of pages) {
    (grouped[p.section] = grouped[p.section] || []).push(p);
  }
  const html = SECTION_ORDER.filter(s => grouped[s])
    .map(s => `
      <div class="section" data-section="${s}">
        <div class="section__label">${SECTION_LABELS[s] || s} <span style="opacity:.5;font-weight:400;">(${grouped[s].length})</span></div>
        ${grouped[s].map(p => `
          <div class="page-item ${currentPage?.path === p.path ? 'active' : ''}" data-path="${p.path}" onclick="loadPage('${p.path}')">
            <div class="page-item__dot"></div>
            <div class="page-item__title">${p.title}</div>
          </div>`).join('')}
      </div>`).join('');
  document.getElementById('pageList').innerHTML = html;
}

function filterPages(q) {
  const filtered = q
    ? allPages.filter(p => p.title.toLowerCase().includes(q.toLowerCase()) || p.path.toLowerCase().includes(q.toLowerCase()))
    : allPages;
  renderSidebar(filtered);
}

// ── Load page ─────────────────────────────────────────────────────────────
async function loadPage(p) {
  if (dirty && !confirm('You have unsaved changes. Discard them?')) return;

  const data = await fetch(`/api/page?path=${encodeURIComponent(p)}`).then(r => r.json());
  currentPage = { path: p, ...data };
  savedPage   = { ...currentPage };
  dirty       = false;

  document.getElementById('emptyState').style.display  = 'none';
  document.getElementById('editorPanel').style.display = 'flex';

  document.getElementById('editorPath').textContent     = p;
  document.getElementById('footerPath').textContent     = p;
  document.getElementById('fieldTitle').value           = data.title;
  document.getElementById('fieldDesc').value            = data.description;
  document.getElementById('fieldDate').value            = data.lastReviewed || '';
  document.getElementById('fieldContent').value         = data.content;

  updateDescCount();
  updateSaveStatus();
  renderSidebar(allPages);

  // Scroll textarea to top
  document.getElementById('fieldContent').scrollTop = 0;
}

// ── Save ───────────────────────────────────────────────────────────────────
async function savePage() {
  if (!currentPage) return;
  document.getElementById('saveBtn').disabled = true;

  const payload = {
    path:         currentPage.path,
    title:        document.getElementById('fieldTitle').value,
    description:  document.getElementById('fieldDesc').value,
    lastReviewed: document.getElementById('fieldDate').value,
    content:      document.getElementById('fieldContent').value,
  };

  const res = await fetch('/api/page', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
  const json = await res.json();

  if (json.ok) {
    savedPage = { ...payload, path: currentPage.path };
    dirty = false;
    updateSaveStatus('saved');
    // Refresh page list (title may have changed)
    allPages = allPages.map(p => p.path === currentPage.path ? { ...p, title: payload.title } : p);
    renderSidebar(allPages);
  } else {
    alert('Save failed: ' + (json.error || 'unknown error'));
    document.getElementById('saveBtn').disabled = false;
  }
}

function revertPage() {
  if (!savedPage) return;
  if (!confirm('Revert to last saved version?')) return;
  document.getElementById('fieldTitle').value   = savedPage.title;
  document.getElementById('fieldDesc').value    = savedPage.description;
  document.getElementById('fieldDate').value    = savedPage.lastReviewed || '';
  document.getElementById('fieldContent').value = savedPage.content;
  dirty = false;
  updateSaveStatus();
  updateDescCount();
}

// ── Dirty tracking ─────────────────────────────────────────────────────────
function markDirty() {
  if (!currentPage) return;
  dirty = true;
  updateSaveStatus('unsaved');
}

function updateSaveStatus(state) {
  const el   = document.getElementById('saveStatus');
  const save = document.getElementById('saveBtn');
  if (state === 'saved') {
    el.className = 'header__status saved';
    el.textContent = '✓ Saved';
    save.disabled = true;
    setTimeout(() => { el.textContent = ''; el.className = 'header__status'; }, 3000);
  } else if (state === 'unsaved') {
    el.className = 'header__status unsaved';
    el.textContent = '● Unsaved changes';
    save.disabled = false;
  } else {
    el.textContent = '';
    save.disabled = true;
  }
}

function updateDescCount() {
  const len = document.getElementById('fieldDesc').value.length;
  const el  = document.getElementById('descCount');
  el.textContent = `${len} / 160`;
  el.className = 'field__hint' + (len > 160 ? ' warn' : '');
}

// ── Build ──────────────────────────────────────────────────────────────────
async function runBuild() {
  const btn       = document.getElementById('buildBtn');
  const console_  = document.getElementById('console');
  const output    = document.getElementById('consoleOutput');
  const indicator = document.getElementById('consoleIndicator');

  btn.disabled    = true;
  output.innerHTML = '';
  console_.classList.add('open');
  indicator.className = 'console__indicator running';

  const appendLine = (text, cls) => {
    const line = document.createElement('div');
    if (cls) line.className = `line--${cls}`;
    line.textContent = text;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
  };

  const es = new EventSource('/api/build');

  es.onmessage = e => {
    const { type, message } = JSON.parse(e.data);
    if (type === 'success') {
      appendLine(message, 'success');
      indicator.className = 'console__indicator success';
      es.close();
      btn.disabled = false;
    } else if (type === 'error') {
      appendLine(message, 'error');
      indicator.className = 'console__indicator error';
      es.close();
      btn.disabled = false;
    } else if (type === 'info') {
      appendLine(message, 'info');
    } else {
      appendLine(message);
    }
  };

  es.onerror = () => {
    appendLine('Connection lost.', 'error');
    indicator.className = 'console__indicator error';
    es.close();
    btn.disabled = false;
  };
}

function closeConsole() {
  document.getElementById('console').classList.remove('open');
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    if (!document.getElementById('saveBtn').disabled) savePage();
  }
});
</script>
</body>
</html>
