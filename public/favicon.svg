<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background -->
  <rect width="48" height="48" rx="8" fill="#4A62C8"/>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="18" fill="rgba(240,243,255,0.12)" stroke="rgba(208,214,240,0.35)" stroke-width="1.5"/>
  <!-- Cardinal ticks -->
  <line x1="24" y1="6" x2="24" y2="11" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="37" x2="24" y2="42" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="24" x2="11" y2="24" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="24" x2="42" y2="24" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- N needle — amber -->
  <polygon points="24,8 21.5,24 26.5,24" fill="#C87830"/>
  <!-- S needle — light periwinkle -->
  <polygon points="24,40 21.5,24 26.5,24" fill="rgba(176,191,245,0.7)"/>
  <!-- E/W needles — subtle -->
  <polygon points="40,24 24,21.5 24,26.5" fill="rgba(176,191,245,0.35)"/>
  <polygon points="8,24 24,21.5 24,26.5" fill="rgba(176,191,245,0.35)"/>
  <!-- Center dot — white -->
  <circle cx="24" cy="24" r="2.5" fill="rgba(255,255,255,0.9)"/>
</svg>
